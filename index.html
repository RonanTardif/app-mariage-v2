<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="format-detection" content="telephone=no, date=no, email=no, address=no" />
    <title>Mariage Ronan &amp; Lorie</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#9baa9a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="R&amp;L" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- SEO / partage -->
    <meta name="description" content="L'app du mariage de Ronan &amp; Lorie — programme, plan, chambres, photos, quiz." />
  </head>
  <body class="bg-stone-50">
    <script>
      // Handle SPA redirect from 404.html (GitHub Pages)
      (function () {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
